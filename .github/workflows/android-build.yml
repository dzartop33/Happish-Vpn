name: Build Happish Android APK

on:
  workflow_dispatch:
    inputs:
      sing_box_tag:
        description: "sing-box tag. Empty = latest stable, example: v1.12.0"
        required: false
        default: ""
      build_libbox:
        description: "Build libbox.aar before APK"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      build_release:
        description: "Build signed release APK. Requires GitHub Secrets"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [ "main", "master" ]
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "scripts/**"
      - ".github/workflows/android-build.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      GRADLE_VERSION: "8.10.2"
      ANDROID_API: "35"
      ANDROID_BUILD_TOOLS: "35.0.0"
      ANDROID_NDK_VERSION: "27.2.12479018"

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        if: ${{ github.event.inputs.build_libbox != 'false' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

            - name: Set up Android command line tools
        uses: android-actions/setup-android@v3

      - name: Set up Android SDK/NDK
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=$ANDROID_HOME"
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SDKMANAGER" ]]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-${ANDROID_API}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
            "platform-tools" \
            "platforms;android-${ANDROID_API}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Download Gradle
        shell: bash
        run: |
          set -euo pipefail
          curl -L "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          echo "/tmp/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"
          /tmp/gradle-${GRADLE_VERSION}/bin/gradle --version

      - name: Build sing-box libbox.aar
        if: ${{ github.event.inputs.build_libbox != 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/sync-libbox.sh
          if [[ -n "${{ github.event.inputs.sing_box_tag }}" ]]; then
            ./scripts/sync-libbox.sh "${{ github.event.inputs.sing_box_tag }}"
          else
            ./scripts/sync-libbox.sh
          fi
          test -f app/libs/libbox.aar
          ls -lh app/libs/libbox.aar

      - name: Verify libbox.aar exists when build skipped
        if: ${{ github.event.inputs.build_libbox == 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f app/libs/libbox.aar ]]; then
            echo "build_libbox=false, but app/libs/libbox.aar is missing." >&2
            echo "Either commit a trusted libbox.aar or run workflow with build_libbox=true." >&2
            exit 1
          fi

      - name: Prepare release signing
        if: ${{ github.event.inputs.build_release == 'true' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "Release signing secrets are missing." >&2
            echo "Required secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD" >&2
            exit 1
          fi
          printf "%s" "${ANDROID_KEYSTORE_BASE64}" | base64 -d > app/release.keystore
          echo "ANDROID_KEYSTORE_FILE=${GITHUB_WORKSPACE}/app/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> "$GITHUB_ENV"
          keytool -list -keystore app/release.keystore -storepass "${ANDROID_KEYSTORE_PASSWORD}" -alias "${ANDROID_KEY_ALIAS}" >/dev/null
          echo "Release keystore prepared"

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace assembleDebug

      - name: Build signed release APK
        if: ${{ github.event.inputs.build_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace assembleRelease
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/*.apk release-artifacts/HappishVPN-release.apk
          ls -lh release-artifacts/HappishVPN-release.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: happish-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload signed release APK artifact
        if: ${{ github.event.inputs.build_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: happish-release-apk
          path: release-artifacts/HappishVPN-release.apk
          if-no-files-found: error

      - name: Upload libbox artifact
        if: ${{ github.event.inputs.build_libbox != 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: libbox-aar
          path: app/libs/libbox.aar
          if-no-files-found: error
